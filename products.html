<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tất Cả Sản Phẩm | Whisky Scotland Chính Hãng | Tuấn Whisky — Tuấn Paris</title>
  <meta name="description" content="Toàn bộ bộ sưu tập whisky Scotland tại Tuấn Whisky: Macallan, Royal Salute, Glenfiddich, Dalmore, Balvenie. Lọc theo thương hiệu, tuổi rượu, giá. Hotline 07577888999.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">
</head>
<body>

<header class="site-header" id="siteHeader"></header>

<section class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Trang chủ</a> / Tất cả sản phẩm</div>
    <span class="eyebrow">Bộ sưu tập</span>
    <h1>Tất cả sản phẩm</h1>
    <p>Toàn bộ whisky Scotland chính hãng tại Tuấn Whisky — lọc theo thương hiệu, tuổi rượu, khoảng giá và loại rượu để tìm chai hoàn hảo của bạn.</p>
  </div>
</section>

<div class="container catalog-layout">
  <aside class="filters" id="filters"></aside>
  <div>
    <div class="catalog-toolbar">
      <button class="btn btn-dark btn-sm filters-toggle" onclick="toggleFilters()">☰ Bộ lọc</button>
      <div class="catalog-count" id="catalogCount"></div>
      <select class="sort-select" onchange="onSortChange(this)">
        <option value="default">Sắp xếp: Mặc định</option>
        <option value="price-asc">Giá: Thấp → Cao</option>
        <option value="price-desc">Giá: Cao → Thấp</option>
        <option value="age-desc">Tuổi rượu: Cao nhất</option>
        <option value="name">Tên: A → Z</option>
      </select>
    </div>
    <div class="product-grid" id="catalogGrid"></div>
  </div>
</div>

<footer class="site-footer" id="siteFooter"></footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/catalog.js"></script>
<script>
  initPage("products");
  initCatalog();
</script>
</body>
</html>
